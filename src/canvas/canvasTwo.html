<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas Text Draw</title>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: black;
      }

      canvas {
        display: block;
        touch-action: none; /* مهم للموبايل */
      }

      #info {
        position: absolute;
        top: 20px;
        left: 20px;
        color: white;
        font-family: Arial, sans-serif;
      }
    </style>
  </head>

  <body>
    <div id="info">Click / Touch and drag to draw</div>
    <canvas id="canvas"></canvas>

    <script>
      // Application variables
      var position = { x: 0, y: window.innerHeight / 2 };
      var counter = 0;
      var minFontSize = 4;

      var letters =
        "Bettaibi     2026     Chokri";

      var canvas;
      var context;
      var mouse = { x: 0, y: 0, down: false };

      // Init
      function init() {
        canvas = document.getElementById("canvas");
        context = canvas.getContext("2d");

        resizeCanvas();
        window.addEventListener("resize", resizeCanvas);

        // Pointer Events (PC + Mobile)
        canvas.addEventListener("pointerdown", pointerDown);
        canvas.addEventListener("pointermove", pointerMove);
        canvas.addEventListener("pointerup", pointerUp);
        canvas.addEventListener("pointerleave", pointerUp);

        canvas.addEventListener("dblclick", clearCanvas);

        canvas.style.touchAction = "none";
      }

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      // Pointer Functions
      function pointerMove(event) {
        mouse.x = event.clientX;
        mouse.y = event.clientY;
        draw();
      }

      function pointerDown(event) {
        mouse.down = true;
        position.x = event.clientX;
        position.y = event.clientY;
        document.getElementById("info").style.display = "none";
      }

      function pointerUp() {
        mouse.down = false;
      }

      // Drawing
      function draw() {
        if (!mouse.down) return;

        var d = distance(position, mouse);
        var fontSize = minFontSize + d / 2;
        var letter = letters[counter];
        var stepSize = textWidth(letter, fontSize);

        if (d > stepSize) {
          var angle = Math.atan2(mouse.y - position.y, mouse.x - position.x);

          context.font = fontSize + "px Georgia";
          context.fillStyle = "white";

          context.save();
          context.translate(position.x, position.y);
          context.rotate(angle);
          context.fillText(letter, 0, 0);
          context.restore();

          counter++;
          if (counter >= letters.length) counter = 0;

          position.x += Math.cos(angle) * stepSize;
          position.y += Math.sin(angle) * stepSize;
        }
      }

      // Helpers
      function distance(pt1, pt2) {
        var dx = pt2.x - pt1.x;
        var dy = pt2.y - pt1.y;
        return Math.sqrt(dx * dx + dy * dy);
      }

      function textWidth(string, size) {
        context.font = size + "px Georgia";
        return context.measureText(string).width;
      }

      function clearCanvas() {
        context.clearRect(0, 0, canvas.width, canvas.height);
      }

      init();
    </script>
  </body>
</html>
